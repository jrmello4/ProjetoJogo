<!DOCTYPE html>
<html lang="pt-BR" class="lenis">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MMA Manager — Simulador de gerenciamento de artes marciais mistas">
  <meta name="theme-color" content="#f8f6f2">
  <title>MMA Manager</title>
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <!-- Tema claro é o padrão (mais profissional/chamativo) — aplicado ANTES
       de qualquer CSS pintar, senão toda carga sem preferência salva pisca
       em escuro por um frame antes do JS do app decidir. -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      document.documentElement.setAttribute('data-theme', saved || 'light');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/motion.css">
  <link rel="stylesheet" href="css/three-arena.css">
  <link rel="stylesheet" href="css/combat-stage.css">
  <link rel="stylesheet" href="css/components.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menu">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>

  <div class="app-container">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-mark">
          <div class="rive-slot rive-slot--lg" data-rive="octagon"></div>
        </div>
        <h1>MMA Manager</h1>
        <p>Carreira de Lutador</p>
      </div>

      <nav aria-label="Navegação principal">
        <p class="nav-group-label">Carreira</p>
        <ul class="nav-menu">
          <li class="nav-item">
            <a class="nav-link active" data-view="dashboard" href="#" role="button">
              <span class="rive-slot" data-rive="dashboard"></span>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="academy" href="#" role="button">
              <span class="rive-slot" data-rive="training"></span>
              <span>Academia</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="training" href="#" role="button">
              <span class="rive-slot" data-rive="training"></span>
              <span>Acampamento</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="finance" href="#" role="button">
              <span class="rive-slot" data-rive="market"></span>
              <span>Finanças</span>
            </a>
          </li>
        </ul>

        <p class="nav-group-label">Circuito</p>
        <ul class="nav-menu">
          <li class="nav-item">
            <a class="nav-link" data-view="offers" href="#" role="button">
              <span class="rive-slot" data-rive="events"></span>
              <span>Ofertas</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="events" href="#" role="button">
              <span class="rive-slot" data-rive="events"></span>
              <span>Mundo</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="calendar" href="#" role="button">
              <span class="rive-slot" data-rive="hall"></span>
              <span>Calendário</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="rankings" href="#" role="button">
              <span class="rive-slot" data-rive="hall"></span>
              <span>Rankings</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="rivalries" href="#" role="button">
              <span class="rive-slot" data-rive="rivalries"></span>
              <span>Rivalidades</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="press-conference" href="#" role="button">
              <span class="rive-slot" data-rive="events"></span>
              <span>Coletiva</span>
            </a>
          </li>
        </ul>

        <p class="nav-group-label">Arquivo</p>
        <ul class="nav-menu">
          <li class="nav-item">
            <a class="nav-link" data-view="hall-of-fame" href="#" role="button">
              <span class="rive-slot" data-rive="hall"></span>
              <span>Hall da Fama</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="notifications" href="#" role="button">
              <span class="rive-slot" data-rive="notifications"></span>
              <span>Notificações</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="settings" href="#" role="button">
              <span class="rive-slot" data-rive="hall"></span>
              <span>Configurações</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" type="button">
          <span class="theme-dot"></span>
          <span id="themeLabel">Alternar Tema</span>
        </button>
        <button class="theme-toggle theme-toggle--danger" id="resetDbBtn" type="button" title="Limpar dados e recomeçar">
          <span>Resetar Dados</span>
        </button>
        <button class="shortcuts-hint" id="shortcutsHintBtn" type="button">Espaço avança semana · ? atalhos</button>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p id="loadingText">Carregando arena...</p>
      </div>
      <script>
        const phrases = [
          'Afiando as luvas...',
          'Aquecendo os músculos...',
          'Estudando o oponente...',
          'Apertando as ataduras...',
          'Passando a pomada...',
          'Rezando para não ter lesão...',
          'Pesando na balança...',
          'Ouvindo o hino...',
        ];
        document.getElementById('loadingText').textContent = phrases[Math.floor(Math.random() * phrases.length)];
      </script>
    </main>
  </div>

  <!-- GSAP + ScrollTrigger (must load before app.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <!-- Lenis smooth scroll -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <!-- Rive -->
  <script src="https://unpkg.com/@rive-app/canvas@2.19.6/rive.js"></script>
  <script type="module" src="js/app.js"></script>
  <noscript>
    <div style="padding: 2rem; text-align: center; color: #c41e3a; font-family: sans-serif;">
      JavaScript é necessário para executar esta aplicação.
    </div>
  </noscript>

  <input type="file" id="saveFileInput" accept=".json" aria-label="Importar arquivo de save" style="display: none;">

  <!-- Fase 9: Drawer lateral para views secundárias -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Painel lateral">
    <div class="drawer-header">
      <h3 id="drawerTitle">Detalhes</h3>
      <button class="drawer-close" id="drawerCloseBtn" aria-label="Fechar painel">&times;</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>
  <script>
    document.getElementById('saveFileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const saveData = JSON.parse(event.target.result);
            localStorage.setItem('mmaManagerSave', JSON.stringify(saveData));
            alert('Save carregado com sucesso!');
            location.reload();
          } catch (err) {
            alert('Erro ao carregar save: arquivo inválido');
          }
        };
        reader.readAsText(file);
      }
    });
  </script>
</body>
</html>
