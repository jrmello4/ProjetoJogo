<!DOCTYPE html>
<html lang="pt-BR" class="lenis">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MMA Manager — Simulador de gerenciamento de artes marciais mistas">
  <meta name="theme-color" content="#14110f">
  <title>MMA Manager</title>
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/motion.css">
  <link rel="stylesheet" href="css/three-arena.css">
  <link rel="stylesheet" href="css/components.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menu">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-mark">
          <div class="rive-slot rive-slot--lg" data-rive="octagon"></div>
        </div>
        <h1>MMA Manager</h1>
        <p>Modo Treinador</p>
      </div>

      <nav aria-label="Navegação principal">
        <p class="nav-group-label">Academia</p>
        <ul class="nav-menu">
          <li class="nav-item">
            <a class="nav-link active" data-view="dashboard" href="#" role="button">
              <span class="rive-slot" data-rive="dashboard"></span>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="roster" href="#" role="button">
              <span class="rive-slot" data-rive="roster"></span>
              <span>Minha Equipe</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="market" href="#" role="button">
              <span class="rive-slot" data-rive="market"></span>
              <span>Recrutar</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="academy" href="#" role="button">
              <span class="rive-slot" data-rive="training"></span>
              <span>Estrutura</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="training" href="#" role="button">
              <span class="rive-slot" data-rive="training"></span>
              <span>Acampamento</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="finance" href="#" role="button">
              <span class="rive-slot" data-rive="market"></span>
              <span>Finanças</span>
            </a>
          </li>
        </ul>

        <p class="nav-group-label">Circuito</p>
        <ul class="nav-menu">
          <li class="nav-item">
            <a class="nav-link" data-view="offers" href="#" role="button">
              <span class="rive-slot" data-rive="events"></span>
              <span>Ofertas</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="events" href="#" role="button">
              <span class="rive-slot" data-rive="events"></span>
              <span>Mundo</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="rankings" href="#" role="button">
              <span class="rive-slot" data-rive="hall"></span>
              <span>Rankings</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="rivalries" href="#" role="button">
              <span class="rive-slot" data-rive="rivalries"></span>
              <span>Rivalidades</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="press-conference" href="#" role="button">
              <span class="rive-slot" data-rive="events"></span>
              <span>Coletiva</span>
            </a>
          </li>
        </ul>

        <p class="nav-group-label">Arquivo</p>
        <ul class="nav-menu">
          <li class="nav-item">
            <a class="nav-link" data-view="hall-of-fame" href="#" role="button">
              <span class="rive-slot" data-rive="hall"></span>
              <span>Hall da Fama</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-view="notifications" href="#" role="button">
              <span class="rive-slot" data-rive="notifications"></span>
              <span>Notificações</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" type="button">
          <span class="theme-dot"></span>
          <span id="themeLabel">Alternar Tema</span>
        </button>
        <button class="theme-toggle theme-toggle--danger" id="resetDbBtn" type="button" title="Limpar dados e recomeçar">
          <span>Resetar Dados</span>
        </button>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Carregando arena...</p>
      </div>
    </main>
  </div>

  <!-- GSAP + ScrollTrigger (must load before app.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <!-- Lenis smooth scroll -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <!-- Rive -->
  <script src="https://unpkg.com/@rive-app/canvas@2.19.6/rive.js"></script>
  <script type="module" src="js/app.js"></script>
  <noscript>
    <div style="padding: 2rem; text-align: center; color: #c41e3a; font-family: sans-serif;">
      JavaScript é necessário para executar esta aplicação.
    </div>
  </noscript>

  <script>
    // PWA — funciona offline e pode ser instalado
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((err) => console.warn('SW não registrado:', err));
      });
    }
  </script>

  <input type="file" id="saveFileInput" accept=".json" style="display: none;">
  <script>
    document.getElementById('saveFileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const saveData = JSON.parse(event.target.result);
            localStorage.setItem('mmaManagerSave', JSON.stringify(saveData));
            alert('Save carregado com sucesso!');
            location.reload();
          } catch (err) {
            alert('Erro ao carregar save: arquivo inválido');
          }
        };
        reader.readAsText(file);
      }
    });
  </script>
</body>
</html>
