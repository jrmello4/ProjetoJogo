<!DOCTYPE html>
<html lang="pt-BR" class="lenis">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MMA Manager — Simulador de gerenciamento de artes marciais mistas">
  <meta name="theme-color" content="#100d0c">
  <title>MMA Manager</title>
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Tema claro é o padrão (mais profissional/chamativo) — aplicado ANTES
       de qualquer CSS pintar, senão toda carga sem preferência salva pisca
       em escuro por um frame antes do JS do app decidir. -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      document.documentElement.setAttribute('data-theme', saved || 'light');
    })();
  </script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/motion.css">
  <link rel="stylesheet" href="css/three-arena.css">
  <link rel="stylesheet" href="css/combat-stage.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pixel-theme.css">
  <link rel="stylesheet" href="css/premium-pass.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menu">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>

  <div class="app-container">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-mark">
          <svg class="pixel-icon pixel-icon--xl" aria-hidden="true"><use href="assets/pixel/ui-icons.svg#icon-octagon"></use></svg>
        </div>
        <h1>MMA Manager</h1>
        <p>Carreira de Lutador</p>
      </div>

      <nav aria-label="Navegação principal">
        <!-- Sidebar rendered dynamically by LayoutView.renderSidebar() -->
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-utility-nav" aria-label="Utilidades">
          <a class="nav-link" data-view="notifications" href="#" role="button">
            <svg class="pixel-icon" aria-hidden="true"><use href="assets/pixel/ui-icons.svg#icon-notifications"></use></svg>
            <span>Notificações</span>
          </a>
          <a class="nav-link" data-view="settings" href="#" role="button">
            <svg class="pixel-icon" aria-hidden="true"><use href="assets/pixel/ui-icons.svg#icon-settings"></use></svg>
            <span>Configurações</span>
          </a>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button">
          <span class="theme-dot"></span>
          <span id="themeLabel">Alternar Tema</span>
        </button>
        <button class="theme-toggle theme-toggle--danger" id="resetDbBtn" type="button" title="Limpar dados e recomeçar">
          <span>Resetar Dados</span>
        </button>
        <button class="shortcuts-hint" id="shortcutsHintBtn" type="button">Espaço avança semana · ? atalhos</button>
      </div>
    </aside>

    <div class="game-hud-host" id="gameHud" hidden aria-live="polite"></div>

    <main class="main-content" id="mainContent">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p id="loadingText">Carregando arena...</p>
      </div>
      <script>
        const phrases = [
          'Afiando as luvas...',
          'Aquecendo os músculos...',
          'Estudando o oponente...',
          'Apertando as ataduras...',
          'Passando a pomada...',
          'Rezando para não ter lesão...',
          'Pesando na balança...',
          'Ouvindo o hino...',
        ];
        document.getElementById('loadingText').textContent = phrases[Math.floor(Math.random() * phrases.length)];
      </script>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
  <noscript>
    <div style="padding: 2rem; text-align: center; color: #c41e3a; font-family: sans-serif;">
      JavaScript é necessário para executar esta aplicação.
    </div>
  </noscript>

  <!-- Fase 9: Drawer lateral para views secundárias -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Painel lateral" aria-hidden="true" inert>
    <div class="drawer-header">
      <h3 id="drawerTitle">Detalhes</h3>
      <button class="drawer-close" id="drawerCloseBtn" aria-label="Fechar painel">&times;</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>
</body>
</html>
