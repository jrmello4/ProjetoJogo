<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMA Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <button class="hamburger" id="hamburgerBtn">☰</button>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>MMA MANAGER</h1>
        <p>Simulador de Gerenciamento</p>
      </div>

      <ul class="nav-menu">
        <li class="nav-item">
          <a class="nav-link active" data-view="dashboard">
            <span class="nav-icon">📊</span>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="roster">
            <span class="nav-icon">👥</span>
            <span>Elenco</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="market">
            <span class="nav-icon">🌐</span>
            <span>Mercado</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="events">
            <span class="nav-icon">🏆</span>
            <span>Eventos</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="training">
            <span class="nav-icon">🏋️</span>
            <span>Acampamento</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="rivalries">
            <span class="nav-icon">⚔️</span>
            <span>Rivalidades</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="hall-of-fame">
            <span class="nav-icon">🏛️</span>
            <span>Hall da Fama</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="notifications">
            <span class="nav-icon">🔔</span>
            <span>Notificações</span>
          </a>
        </li>
      </ul>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle">
          <span>🌓</span>
          <span id="themeLabel">Alternar Tema</span>
        </button>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
    </main>
  </div>

  <script type="module" src="js/app.js"></script>

  <input type="file" id="saveFileInput" accept=".json" style="display: none;">
  <script>
    document.getElementById('saveFileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const saveData = JSON.parse(event.target.result);
            localStorage.setItem('mmaManagerSave', JSON.stringify(saveData));
            alert('Save carregado com sucesso!');
            location.reload();
          } catch (err) {
            alert('Erro ao carregar save: arquivo inválido');
          }
        };
        reader.readAsText(file);
      }
    });
  </script>
</body>
</html>
