<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMA Manager</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <button class="hamburger" id="hamburgerBtn">☰</button>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>MMA MANAGER</h1>
        <p>Simulador de Gerenciamento</p>
      </div>

      <ul class="nav-menu">
        <li class="nav-item">
          <a class="nav-link active" data-view="dashboard">
            <span class="nav-icon">📊</span>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="roster">
            <span class="nav-icon">👥</span>
            <span>Elenco</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="market">
            <span class="nav-icon">🌐</span>
            <span>Mercado</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="events">
            <span class="nav-icon">🏆</span>
            <span>Eventos</span>
          </a>
        </li>
      </ul>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle">
          <span>🌓</span>
          <span id="themeLabel">Alternar Tema</span>
        </button>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
